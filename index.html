<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - O Sol da Intercontinental</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #000000, #303030);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        .layout-container {
            position: relative;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #FFD700, #FF8C00, #FF4500, #4B0082, #00CED1);
            box-shadow: 0 0 80px rgba(255, 215, 0, 1),
                        0 0 150px rgba(255, 140, 0, 0.9),
                        0 0 250px rgba(255, 69, 0, 0.8);
        }
        canvas {
            width: 95%;
            height: 95%;
            border-radius: 50%;
            background: transparent;
        }
        #date-time {
            font-size: 18px;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        #status {
            margin-top: 15px;
            font-size: 18px;
            color: white;
            text-align: center;
        }
        .outer-text {
            font-size: 20px;
            text-align: center;
            color: white;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        .highlight {
            color: #FFD700;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { text-shadow: 0 0 10px #FFD700; }
            50% { text-shadow: 0 0 25px #FFA500; }
            100% { text-shadow: 0 0 10px #FFD700; }
        }
        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        button {
            font-size: 18px;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        #play { background: green; color: white; }
        #play:hover { background: lime; }
        #stop { background: red; color: white; }
        #stop:hover { background: darkred; }
        #volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        #volume-bar {
            width: 200px;
            height: 20px;
            background: linear-gradient(90deg, lime, yellow, red);
            border-radius: 10px;
            position: relative;
        }
        #volume-level {
            height: 100%;
            background: white;
            border-radius: 10px;
        }
        #listener-count {
            margin-top: 15px;
            font-size: 18px;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <div id="date-time">Data: Carregando... | Hora: Carregando...</div>
    <div id="status">
        Status: <span id="status-text">Offline</span>
        <span id="status-light" style="display: inline-block; width: 20px; height: 20px; background: red; border-radius: 50%;"></span>
    </div>
    <div id="listener-count">🎧 Ouvintes Online: 0</div>
    <div class="layout-container">
        <canvas id="spectrum"></canvas>
    </div>
    <div class="outer-text">
        🌞 <span class="highlight">Aurora - O Sol da Intercontinental</span> 🌞
    </div>
    <div class="button-group">
        <button id="play">Play</button>
        <button id="stop">Pause</button>
    </div>
    <div id="volume-control">
        <button id="volume-down">-</button>
        <div id="volume-bar">
            <div id="volume-level" style="width: 50%;"></div>
        </div>
        <button id="volume-up">+</button>
    </div>
    <script>
        const audioUrl = "https://stream.zeno.fm/wzcgaal0dnltv";
        const audio = new Audio(audioUrl);
        audio.crossOrigin = "anonymous";
        let isPlaying = false;

        const playButton = document.getElementById("play");
        const stopButton = document.getElementById("stop");
        const volumeUpButton = document.getElementById("volume-up");
        const volumeDownButton = document.getElementById("volume-down");
        const volumeLevel = document.getElementById("volume-level");
        const dateTimeDisplay = document.getElementById("date-time");
        const statusText = document.getElementById("status-text");
        const statusLight = document.getElementById("status-light");
        const listenerCountDisplay = document.getElementById("listener-count");
        const canvas = document.getElementById("spectrum");
        const ctx = canvas.getContext("2d");
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);

        analyser.fftSize = 256;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function updateStatus(online) {
            statusText.textContent = online ? "Online" : "Offline";
            statusLight.style.background = online ? "lime" : "red";
        }

        function playAudio() {
            if (!isPlaying) {
                audio.play();
                audioCtx.resume().then(() => {
                    isPlaying = true;
                    updateStatus(true);
                    renderSpectrum();
                });
            }
        }

        function stopAudio() {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                updateStatus(false);
                clearCanvas();
            }
        }

        function adjustVolume(change) {
            let newVolume = Math.min(1, Math.max(0, audio.volume + change));
            audio.volume = newVolume;
            volumeLevel.style.width = `${newVolume * 100}%`;
        }

        function renderSpectrum() {
            analyser.getByteFrequencyData(dataArray);
            clearCanvas();

            const barWidth = canvas.width / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = dataArray[i] * 0.5;
                ctx.fillStyle = `hsl(${(i / bufferLength) * 360}, 100%, 50%)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }

            if (isPlaying) {
                requestAnimationFrame(renderSpectrum);
            }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function updateDateTime() {
            const now = new Date();
            const date = now.toLocaleDateString('pt-BR');
            const time = now.toLocaleTimeString('pt-BR');
            dateTimeDisplay.textContent = `Data: ${date} | Hora: ${time}`;
        }

        function fetchListenerCount() {
            listenerCountDisplay.textContent = `🎧 Ouvintes Online: ${Math.floor(Math.random() * 100) + 1}`;
        }

        playButton.addEventListener("click", playAudio);
        stopButton.addEventListener("click", stopAudio);
        volumeUpButton.addEventListener("click", () => adjustVolume(0.1));
        volumeDownButton.addEventListener("click", () => adjustVolume(-0.1));
        updateDateTime();
        setInterval(updateDateTime, 1000);
        setInterval(fetchListenerCount, 5000);
    </script>
</body>
</html>
